<!-- v4 verified: timers, one/all sentence mode, colour themes -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentence Activity Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="theme-bar">
      <label for="themeSelect">Theme</label>
      <select id="themeSelect" class="theme-select" aria-label="Choose colour theme">
        <option value="ocean" selected>Ocean</option>
        <option value="sky">Sky</option>
        <option value="berry">Berry</option>
        <option value="forest">Forest</option>
        <option value="sunset">Sunset</option>
      </select>
    </div>
    <main>
      <section id="landingPage" class="landing-grid" aria-label="Landing page">
        <div class="card input-card">
          <div class="card-header">
            <p class="eyebrow">Your sentences</p>
            <span class="pill">1 sentence per line</span>
          </div>

          <label for="targetInput" class="field-label">Target-language sentences</label>
          <textarea id="targetInput" class="main-textarea" spellcheck="false" placeholder="Ich bin in die Stadt gegangen&#10;Ich habe einen Film gesehen&#10;Es war lustig"></textarea>

          <label for="englishInput" class="field-label translation-label">English translations, in the same order</label>
          <textarea id="englishInput" class="translation-textarea" spellcheck="false" placeholder="I went into town.&#10;I watched a film.&#10;It was funny."></textarea>

          <div class="button-row">
            <button id="exampleButton" class="secondary-button" type="button">Examples</button>
            <button id="clearButton" class="secondary-button" type="button">Clear Text</button>
          </div>
        </div>

        <aside class="card activity-card">
          <p class="eyebrow">Activities</p>
          <div class="activity-buttons" id="activityButtons"></div>
          <div class="activity-help" id="activityHelp">
            Hover over an activity for more information.
          </div>
        </aside>
      </section>

      <section id="activityPage" class="activity-page hidden" aria-label="Activity page">
        <div class="activity-topbar">
          <button id="backTopButton" class="ghost-button" type="button">← Back</button>
          <select id="activitySwitcher" class="activity-switcher" aria-label="Choose activity"></select>
        </div>

        <div class="activity-heading">
          <h2 id="activityTitle">Jumble Words</h2>
          <p id="studentInstruction" class="student-instruction"></p>
        </div>

        <div class="puzzle-panel">
          <div id="puzzleList" class="puzzle-list"></div>
        </div>

        <div class="control-bar">
          <select id="textSizeSelect" class="control-button size-select" aria-label="Choose text size">
            <option value="s">S</option>
            <option value="m">M</option>
            <option value="l" selected>L</option>
            <option value="xl">XL</option>
          </select>
          <select id="viewModeSelect" class="control-button option-select" aria-label="Show one sentence or all sentences">
            <option value="all" selected>All sentences</option>
            <option value="one">One sentence</option>
          </select>
          <button id="prevSentenceButton" class="control-button hidden-control" type="button">←</button>
          <button id="nextSentenceButton" class="control-button hidden-control" type="button">→</button>
          <select id="activityOptionSelect" class="control-button option-select hidden-control" aria-label="Activity option"></select>
          <select id="timeOptionSelect" class="control-button option-select hidden-control" aria-label="Timer length"></select>
          <button id="startButton" class="control-button hidden-control" type="button">Start</button>
          <div id="timerDisplay" class="timer-display hidden-control" aria-live="polite"></div>
          <button id="showAllButton" class="control-button" type="button">Show All Answers</button>
          <button id="showEnglishButton" class="control-button" type="button">Show English</button>
          <button id="copyButton" class="control-button" type="button">Copy</button>
          <button id="backButton" class="control-button" type="button">Back</button>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
